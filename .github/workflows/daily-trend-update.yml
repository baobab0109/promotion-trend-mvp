name: Daily Trend Update

on:
  workflow_dispatch:
    inputs:
      collect_limit:
        description: Maximum collected items to plan/write before curation
        required: false
        type: number
        default: 40
      dry_run:
        description: Run collect/curate without writing to Notion or committing data
        required: false
        type: boolean
        default: false
  schedule:
    # 07:00 KST every day (22:00 UTC on the previous day)
    - cron: '0 22 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_HUB_PAGE_ID: ${{ secrets.NOTION_HUB_PAGE_ID }}
  NOTION_WEEKS_DATABASE_ID: ${{ secrets.NOTION_WEEKS_DATABASE_ID }}
  NOTION_TRENDS_DATABASE_ID: ${{ secrets.NOTION_TRENDS_DATABASE_ID }}
  NOTION_EVIDENCE_DATABASE_ID: ${{ secrets.NOTION_EVIDENCE_DATABASE_ID }}
  NOTION_IDEAS_DATABASE_ID: ${{ secrets.NOTION_IDEAS_DATABASE_ID }}

concurrency:
  group: daily-trend-update-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect external trend signals
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_LIMIT: ${{ github.event.inputs.collect_limit || '40' }}
        run: |
          ARGS="--status=Draft --limit=${INPUT_LIMIT} --json"
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            ARGS="--dry-run ${ARGS}"
          fi
          npm run collect:signals -- ${ARGS}

      - name: Curate trend content and promotion ideas
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS="--json"
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            ARGS="--dry-run ${ARGS}"
          fi
          npm run curate:trends -- ${ARGS}

      - name: Sync Notion data to static JSON
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: npm run sync:notion

      - name: Validate generated data and build
        run: |
          npm test -- --run
          npm run build

      - name: Commit generated JSON if changed
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "No Notion data changes to commit."
          else
            git commit -m "chore: daily trend data sync"
            git push
          fi

      - name: Upload GitHub Pages artifact
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: ${{ github.event.inputs.dry_run != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4
