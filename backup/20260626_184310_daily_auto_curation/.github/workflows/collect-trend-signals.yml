name: Collect Trend Signals

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without writing to Notion
        required: false
        type: boolean
        default: true
      status:
        description: Evidence Item status for created/updated pages
        required: false
        type: choice
        options:
          - Draft
          - Published
        default: Draft
      limit:
        description: Maximum collected items to plan/write
        required: false
        type: number
        default: 20
  schedule:
    # 07:00 KST every day (22:00 UTC on the previous day)
    - cron: '0 22 * * *'

permissions:
  contents: read

env:
  NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
  NOTION_WEEKS_DATABASE_ID: ${{ secrets.NOTION_WEEKS_DATABASE_ID }}
  NOTION_TRENDS_DATABASE_ID: ${{ secrets.NOTION_TRENDS_DATABASE_ID }}
  NOTION_EVIDENCE_DATABASE_ID: ${{ secrets.NOTION_EVIDENCE_DATABASE_ID }}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Collect external trend signals
        env:
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_STATUS: ${{ github.event.inputs.status || 'Draft' }}
          INPUT_LIMIT: ${{ github.event.inputs.limit || '20' }}
        run: |
          ARGS="--status=${INPUT_STATUS} --limit=${INPUT_LIMIT} --json"
          if [ "${INPUT_DRY_RUN}" = "true" ]; then
            ARGS="--dry-run ${ARGS}"
          fi
          npm run collect:signals -- ${ARGS}
